model_list:
  - model_name: toka-chat
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: toka-chat-coder
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: toka-chat-openai
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: toka-embedding
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: toka-embedding-openai
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  request_timeout: 60
  num_retries: 2
  drop_params: true
  set_verbose: false

router_settings:
  fallbacks:
    - {"toka-chat": ["toka-chat-coder"]}
    - {"toka-chat-coder": ["toka-chat"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
